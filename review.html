<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Review Jawaban</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43);
        padding: 40px;
        color: white;
      }

      .box {
        max-width: 900px;
        margin: auto;
        background: rgba(255, 255, 255, 0.08);
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(20px);
      }

      .soal {
        margin-bottom: 25px;
        padding: 15px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
      }

      .benar {
        color: #00ff88;
        font-weight: bold;
      }

      .salah {
        color: #ff4d4d;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>Review Jawaban</h2>

      <div id="review"></div>
    </div>

    <script>
      const soal = JSON.parse(localStorage.getItem("bankSoal"));
      const jawaban = JSON.parse(localStorage.getItem("jawabanUser"));

      let html = "";

      soal.forEach((s, i) => {
        let user = jawaban[i];
        let kunci = s.j;

        html += `
<div class="soal">
<p><b>${i + 1}. ${s.t}</b></p>
<p>Jawaban kamu : ${s.p[user] ?? "-"}</p>
<p>Kunci : ${s.p[kunci]}</p>
<p class="${user == kunci ? "benar" : "salah"}">
${user == kunci ? "BENAR" : "SALAH"}
</p>
</div>
`;
      });

      document.getElementById("review").innerHTML = html;
    </script>
  </body>
</html>
